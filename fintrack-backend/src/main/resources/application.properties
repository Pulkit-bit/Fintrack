spring.application.name=fintrack
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/fintrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:fintrack_user}
spring.datasource.password=${DB_PASSWORD:fintrack_pass}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
frontend.url=http://localhost:5173
